name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx turbo run lint --filter='!@repo/api'

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx turbo run typecheck --filter='!@repo/api'

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx turbo run test --filter=@repo/web

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: typecheck
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: seller_autopilot
          POSTGRES_PASSWORD: localdev
          POSTGRES_DB: seller_autopilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U seller_autopilot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://seller_autopilot:localdev@localhost:5432/seller_autopilot
      APP_DATABASE_URL: postgresql+asyncpg://app_user:app_user_pass@localhost:5432/seller_autopilot
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e "apps/api[dev]"
      - run: cd apps/api && ruff check .
      - run: cd apps/api && alembic upgrade head
      - run: cd apps/api && python -m pytest tests/ -v

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx turbo run build
