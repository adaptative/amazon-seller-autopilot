<!DOCTYPE html>

        theme: {
          extend: {
            colors: {
              "sky-joy": "#e0f2fe",
              "primary-pop": "#3b82f6",
              "accent-joy": "#f472b6",
              "surface": "#ffffff",
              "on-surface": "#1e293b"

            fontFamily: {
              "whimsical": ["Fredoka", "sans-serif"],

          },

    0% {
        transform: translateX(-10%);
        } 100% {
        transform: translateX(10%);
        }
    }
.animate-float {
    animation: float 4s ease-in-out infinite
    }
.cloud-drift {
    animation: drift 15s ease-in-out infinite alternate

<body class="bg-[#f0f9ff] text-on-surface font-body min-h-screen overflow-hidden relative selection:bg-accent-joy/30">
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">

<div class="cloud-drift absolute top-20 left-[10%] w-64 h-32 bg-white/60 rounded-full blur-3xl"></div>
<div class="cloud-drift absolute top-40 right-[15%] w-80 h-40 bg-white/40 rounded-full blur-3xl" style="animation-delay: -5s;"></div>
<div class="absolute -bottom-20 -left-20 w-[600px] h-[600px] bg-blue-100 rounded-full opacity-40 mix-blend-multiply blur-3xl"></div>

<main class="relative z-10 flex flex-col items-center justify-center min-h-screen p-6 text-center">

<div class="w-64 h-48 bg-white border-4 border-primary-pop rounded-3xl relative flex flex-col items-center justify-center overflow-hidden shadow-2xl">

<div class="relative z-10 w-8 h-4 border-b-4 border-slate-800 rounded-full mt-2"></div>

<p class="text-sm text-slate-400 pt-6">

</p>

<footer class="fixed bottom-0 w-full py-8 px-12 flex flex-col md:flex-row justify-between items-center text-slate-400 text-sm gap-4">
<div class="flex items-center gap-2">
<div class="w-8 h-8 bg-primary-pop rounded-lg flex items-center justify-center">

<span class="font-whimsical font-bold text-slate-600 text-lg">Seller Autopilot</span>
</div>
<div class="flex gap-8 font-medium">
<a class="hover:text-primary-pop transition-colors" href="#">Privacy</a>
<a class="hover:text-primary-pop transition-colors" href="#">Terms</a>

<div class="fixed -bottom-12 -right-12 w-64 h-64 bg-primary-pop/10 rounded-full blur-3xl opacity-30"></div>
